backend = "xrender";
vsync = true;

shadow = true;
shadow-radius = 14;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.22;

fading = true;
fade-delta = 7;
fade-in-step = 0.04;
fade-out-step = 0.04;

inactive-opacity = 0.98;
active-opacity = 1.0;
frame-opacity = 0.96;

wintypes:
{
  dock = { shadow = false; };
  dnd = { shadow = false; };
  tooltip = { opacity = 0.95; shadow = true; };
  popup_menu = { opacity = 0.98; };
  dropdown_menu = { opacity = 0.98; };
};

